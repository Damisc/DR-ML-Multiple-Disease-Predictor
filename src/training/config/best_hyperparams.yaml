diabetes:
  model_type: svc
  params:
    C: 1000
    gamma: 0.001
    class_weight: balanced
    probability: true


heart_disease:
  model_type: random_forest
  params:
    bootstrap: True
    ccp_alpha: 0.00062
    n_estimators: 403
    max_samples: 0.786
    max_depth: 3
    min_samples_leaf: 18
    min_samples_split: 22
    max_features: 0.05
    